name: Build Release Artifacts

on:
  release:
    types: [published]

jobs:
  build-wheels:
    name: Build wheel ${{ matrix.os }} ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.13","3.14"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          uv version $VERSION --no-sync

      - run: uv build --python ${{ matrix.python-version }}

      - name: Repair Linux wheels
        if: matrix.os == 'ubuntu-latest'
        run: |
          uv tool install auditwheel
          for whl in dist/*.whl; do
            auditwheel repair "$whl" -w dist/
            rm "$whl" # only ship the manylinux version
          done

      - name: Upload wheels to artifact store
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.python-version }}
          path: dist/*

  publish:
    needs: build-wheels
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - run: ls -R dist

      - uses: astral-sh/setup-uv@v5
      - run: uv publish dist/**/*
